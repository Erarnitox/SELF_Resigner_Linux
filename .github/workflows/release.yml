name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(git tag --sort=-v:refname | head -n1)
            if [ -z "$TAG" ]; then
              echo "No tags found in repository." >&2
              exit 1
            fi
            echo "Manual run: using latest tag '$TAG'"
          else
            TAG="${{ github.ref_name }}"
            echo "Tag push: using '$TAG'"
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.release_tag }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libgl-dev pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "${{ runner.temp }}/vcpkg"
          "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/build/package-root" \
            -DBUILD_TESTING=OFF \
            -DCPACK_PACKAGE_VERSION="${{ needs.resolve-version.outputs.release_tag }}"

      - name: Build, install, and package
        run: |
          cmake --build build
          cmake --install build
          cmake --build build --target package

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-linux-x86_64
          path: build/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-linux-x86_64.zip

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.release_tag }}

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/build/package-root" `
            -DBUILD_TESTING=OFF `
            -DCPACK_PACKAGE_VERSION="${{ needs.resolve-version.outputs.release_tag }}"

      - name: Build, install, and package
        shell: pwsh
        run: |
          cmake --build build
          cmake --install build
          cmake --build build --target package

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-windows-x86_64
          path: build/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-windows-x86_64.zip

  release:
    needs: [resolve-version, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve-version.outputs.release_tag }}
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          generate_release_notes: true
          body: |
            ## Downloads

            Extract the ZIP for your platform and run the tools from inside the extracted folder.

            | Platform | Package |
            |----------|---------|
            | Linux x86_64 | `ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-linux-x86_64.zip` |
            | Windows x86_64 | `ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-windows-x86_64.zip` |

            ## Included tools

            - **eboot_diff** — GUI tool to compare and patch EBOOT.BIN / EBOOT.ELF files
            - **resigner** — CLI tool to resign PS3 SELF/SPRX files

            See [README.MD](https://github.com/${{ github.repository }}/blob/master/README.MD) for installation and usage.
          files: |
            packages/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-linux-x86_64/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-linux-x86_64.zip
            packages/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-windows-x86_64/ps3_tools-${{ needs.resolve-version.outputs.release_tag }}-windows-x86_64.zip
